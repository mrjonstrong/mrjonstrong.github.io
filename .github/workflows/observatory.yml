name: Mozilla Observatory

on:
  schedule:
    - cron: "0 14 * * 1" # Every Monday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  observatory:
    name: HTTP Security Headers
    runs-on: ubuntu-latest
    steps:
      - name: Scan and check grade
        run: |
          set -euo pipefail
          result_file=$(mktemp)
          trap 'rm -f "$result_file"' EXIT
          http_code=$(curl -s --max-time 30 \
            -w "%{http_code}" \
            -o "$result_file" \
            -X POST \
            "https://observatory-api.mdn.mozilla.net/api/v2/scan?host=jonathanstrong.org") \
            || { echo "::error::curl transport error contacting Observatory API (network failure or timeout)"; exit 1; }
          result=$(cat "$result_file")
          if [[ "$http_code" != "200" ]]; then
            echo "::error::Observatory API returned HTTP $http_code: $result"
            exit 1
          fi
          if ! echo "$result" | jq empty 2>/dev/null; then
            echo "::error::Observatory API returned non-JSON response (HTTP $http_code): ${result:0:300}"
            exit 1
          fi
          grade=$(echo "$result" | jq -r '.grade')
          score=$(echo "$result" | jq -r '.score')
          if [[ "$grade" == "null" || -z "$grade" ]]; then
            echo "::error::Observatory API did not return a grade (rate-limited, scan pending, or unexpected response): $result"
            exit 1
          fi
          echo "Grade: $grade (Score: $score)"
          # Minimum passing grade: B. B- and below (C+, C, C-, D+, D, D-, F) fail.
          case "$grade" in
            A+|A|A-|B+|B) echo "Pass" ;;
            *) echo "::error::Observatory grade $grade is below minimum (B)"; exit 1 ;;
          esac
