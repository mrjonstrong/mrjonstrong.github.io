name: Lighthouse

on:
  schedule:
    - cron: "0 15 * * 1" # Every Monday at 15:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse Scores
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit and push updated badge SVGs to a branch for PRs
      pull-requests: write  # needed to create pull requests via GITHUB_TOKEN
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            a.nel.cloudflare.com:443
            accounts.google.com:443
            android.clients.google.com:443
            api.github.com:443
            clients2.google.com:80
            content-autofill.googleapis.com:443
            dl.google.com:443
            github.com:443
            img.shields.io:443
            jonathanstrong.org:443
            mtalk.google.com:5228
            registry.npmjs.org:443
            safebrowsingohttpgateway.googleapis.com:443
            www.google.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: develop
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb

      - name: Run Lighthouse
        run: |
          pnpm exec lighthouse https://jonathanstrong.org \
            --output=json \
            --output-path=/tmp/lh.json \
            --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage" \
            --only-categories=performance,accessibility,best-practices,seo \
            --quiet

      - name: Generate badge SVGs
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const https = require('https');

          const report = JSON.parse(fs.readFileSync('/tmp/lh.json', 'utf8'));
          const cats   = report.categories;

          function pct(score) {
            return score != null ? Math.round(score * 100) : null;
          }

          const scores = {
            performance:      pct(cats?.performance?.score),
            accessibility:    pct(cats?.accessibility?.score),
            'best-practices': pct(cats?.['best-practices']?.score),
            seo:              pct(cats?.seo?.score),
          };

          fs.mkdirSync('badges', { recursive: true });

          function color(n) {
            if (n >= 90) return 'brightgreen';
            if (n >= 50) return 'orange';
            return 'red';
          }

          function download(url, dest, hops = 0) {
            if (hops > 5) {
              // Safety limit — prevents infinite redirect loops.
              return Promise.reject(new Error(`Too many redirects downloading badge from ${url}`));
            }
            const { hostname } = new URL(url);
            if (hostname !== 'img.shields.io' || !url.startsWith('https://')) {
              // SSRF guard — only follow HTTPS requests that stay on shields.io.
              return Promise.reject(new Error(`Unexpected redirect host or protocol: ${url}`));
            }
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const request = https.get(url, (res) => {
                const handleError = (err) => {
                  // Ensure the file is closed and any partial file is removed.
                  file.close(() => {
                    fs.unlink(dest, () => {
                      // Ignore unlink errors; propagate original error instead.
                      reject(err);
                    });
                  });
                };

                // Follow redirects explicitly.
                if (res.statusCode >= 300 && res.statusCode < 400) {
                  if (!res.headers.location) {
                    handleError(new Error(`Redirect from ${url} missing Location header`));
                    return;
                  }
                  // Discard any response body for the redirect.
                  res.resume();
                  file.close(() => {
                    fs.unlink(dest, () => {
                      download(new URL(res.headers.location, url).href, dest, hops + 1)
                        .then(resolve)
                        .catch(reject);
                    });
                  });
                  return;
                }

                // Reject on any non-200, non-redirect status.
                if (res.statusCode !== 200) {
                  // Consume and discard the body so the connection can be reused.
                  res.resume();
                  handleError(new Error(`Failed to download badge from ${url}: HTTP ${res.statusCode}`));
                  return;
                }

                res.pipe(file);
                file.on('finish', () => {
                  file.close(() => resolve());
                });
                file.on('error', handleError);
                res.on('error', handleError);
              });

              request.on('error', (err) => {
                file.close(() => {
                  fs.unlink(dest, () => {
                    reject(err);
                  });
                });
              });
            });
          }

          (async () => {
            const nullCategories = Object.entries(scores).filter(([, s]) => s === null);
            if (nullCategories.length > 0) {
              console.error(`Lighthouse returned null scores for: ${nullCategories.map(([k]) => k).join(', ')}`);
              console.error('This usually means the page failed to load or an audit could not run.');
              console.error('Badges will NOT be updated to avoid overwriting valid scores with 0%.');
              process.exit(1);
            }
            for (const [key, score] of Object.entries(scores)) {
              const label = key.replace(/-/g, '+');
              const url   = `https://img.shields.io/badge/${label}-${score}%25-${color(score)}?style=flat`;
              const dest  = `badges/lighthouse-${key}.svg`;
              console.log(`${key}: ${score} → ${dest}`);
              await download(url, dest);
            }
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit badges
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/
          if git diff --staged --quiet; then
            echo "Badges unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore: update Lighthouse score badges [skip ci]"
          echo "BADGES_CHANGED=true" >> "$GITHUB_ENV"

      - name: Create badge update branch
        if: env.BADGES_CHANGED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth setup-git
          BRANCH="badge-update-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
          git checkout -b "$BRANCH"
          git push --set-upstream origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        if: env.BADGES_CHANGED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --head "$BRANCH" \
            --base develop \
            --title "chore: update Lighthouse score badges" \
            --body "Automated badge update from Lighthouse workflow."
