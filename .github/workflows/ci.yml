name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "astro.config.ts"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "biome.json"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - ".nvmrc"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "astro.config.ts"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "biome.json"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - ".nvmrc"

permissions:
  contents: read

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check & lint (astro check + biome)
        run: pnpm check
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0

      - name: Audit dependencies
        continue-on-error: true
        run: pnpm audit --audit-level=critical

      - name: Build
        run: pnpm build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
